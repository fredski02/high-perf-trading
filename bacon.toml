default_job = "check"

[jobs.check]
command = ["cargo", "check", "--workspace", "--all-targets"]

[jobs.test]
command = ["cargo", "test", "--workspace"]

[jobs.clippy]
command = ["cargo", "clippy", "--workspace", "--all-targets", "--", "-Dwarnings"]

[jobs.fmt]
command = ["cargo", "fmt", "--all", "--", "--check"]

